<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Concert Ticketing System - Sign Up</title>
        <!-- Bootstrap CSS -->
        <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand" href="index.html">Concert Ticketing</a>
            <div class="navbar-nav ml-auto">
                <a class="nav-item nav-link" href="login.html">Login</a>
                <a class="nav-item nav-link" href="events.html">Events</a>
            </div>
        </nav>

        <!-- Sign-Up Form -->
        <div class="container d-flex justify-content-center">
            <div class="card p-4 mt-5" style="width: 25rem;">
                <h3 class="card-title text-center">Sign Up</h3>
                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" class="form-control" id="fullname" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
                </form>
                <br />
                <p style="text-align: center;">Already a Member?  <a id="goLogIn" href="LogIn.html">Log In</a></p>

                <div id="signupSuccess" class="alert alert-success mt-3" style="display: none;">
                    Registration successful! You can now <a href="LogIn.html">Log In</a>.
                </div>
            </div>
        </div>

        <!-- Bootstrap JS and Custom JS -->         
        <script src="/JS/SignUp.js"></script>
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
